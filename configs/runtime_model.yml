slot_duration: 0.1
local_service_capacity: 0.5
public_service_capacity: 0.5
cloud_service_capacity: 3.0
timeout_grace_slots: 0
runtime_variant: density_based
destination_kinds:
  local:
    paper_status: paper-explicit
    note: local execution remains the baseline execution path
  public:
    paper_status: paper-implied
    note: public queue service is modeled as destination-specific execution
  cloud:
    paper_status: paper-implied
    note: cloud service is modeled as destination-specific execution
assumptions:
  slot_duration:
    paper_status: assumption-backed
    note: exact slot length is not fully recovered from the staged paper resources
  local_service_capacity:
    paper_status: assumption-backed
    note: exact local service capacity is not fully recovered from the staged paper resources
  public_service_capacity:
    paper_status: assumption-backed
    note: exact public service capacity is not fully recovered from the staged paper resources
  cloud_service_capacity:
    paper_status: assumption-backed
    note: exact cloud service capacity is not fully recovered from the staged paper resources
  timeout_grace_slots:
    paper_status: assumption-backed
    note: explicit grace window is not fully recovered from the staged paper resources
  runtime_variant:
    paper_status: assumption-backed
    note: variant selection is an experimental extension and defaults to density_based