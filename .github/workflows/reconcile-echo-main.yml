name: Reconcile ECHO branch with main once

on:
  push:
    branches:
      - echo/verified-figures-5-8

permissions:
  contents: write

jobs:
  reconcile:
    runs-on: ubuntu-latest
    steps:
      - name: Check out active branch
        uses: actions/checkout@v4
        with:
          ref: echo/verified-figures-5-8
          fetch-depth: 0

      - name: Merge main without losing the verified ECHO tree
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main echo/verified-figures-5-8
          if git merge-base --is-ancestor origin/main HEAD; then
            echo "MAIN_ALREADY_ANCESTOR"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git merge --no-ff -X ours origin/main \
            -m "Merge main history into verified ECHO execution branch"
          git push origin HEAD:echo/verified-figures-5-8
          echo "MAIN_RECONCILIATION_PUSHED"
