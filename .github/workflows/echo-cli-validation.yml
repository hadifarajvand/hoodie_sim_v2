name: ECHO CLI and non-long validation

on:
  push:
    branches:
      - main
    paths:
      - "src/hoodie/experiments/**"
      - "src/environment/**"
      - "tests/unit/**"
      - "tests/integration/**"
      - "tests/acceptance/**"
      - "scripts/echo/**"
      - ".github/workflows/echo-cli-validation.yml"
  pull_request:
    branches:
      - main
    paths:
      - "src/hoodie/experiments/**"
      - "src/environment/**"
      - "tests/unit/**"
      - "tests/integration/**"
      - "tests/acceptance/**"
      - "scripts/echo/**"
      - ".github/workflows/echo-cli-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: echo-cli-validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      MPLBACKEND: Agg
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package and development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Compile application modules
        run: python -m compileall -q src/hoodie src/environment

      - name: Verify installed CLI surface
        run: |
          hoodie-experiments --help
          for command in \
            aggregate verify render export-bundle finalize \
            echo-train echo-eval echo-diff echo-pilot echo-status echo-verify-run
          do
            hoodie-experiments "$command" --help
          done

      - name: Run focused ECHO regressions
        run: |
          python -m pytest -q \
            tests/unit/test_echo_campaign_layout.py \
            tests/unit/test_echo_cli_parser.py \
            tests/unit/test_resume_missing_job_dir.py \
            tests/unit/test_evaluation_reset_runtime_fix.py \
            tests/unit/test_external_pipeline_layout.py

      - name: Run deterministic mechanism smoke
        run: |
          rm -rf /tmp/echo-verified-smoke
          bash scripts/echo/run_verified_smoke.sh /tmp/echo-verified-smoke

      - name: Run all non-long CPU tests
        run: |
          python -m pytest -q \
            tests/unit tests/integration tests/acceptance \
            -m "not slow and not requires_cuda and not requires_mps"
