name: ECHO CLI and non-long validation

on:
  push:
    branches:
      - "main"
  pull_request:
    paths:
      - "src/hoodie/experiments/**"
      - "src/environment/**"
      - "tests/unit/**"
      - "tests/integration/**"
      - "tests/acceptance/**"
      - "scripts/echo/**"
      - ".github/workflows/echo-cli-validation.yml"
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: echo-cli-validation-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      MPLBACKEND: Agg
      VALIDATION_LOG: ${{ runner.temp }}/echo-validation.log
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Run all non-long validation
        id: validation
        shell: bash
        run: |
          set +e
          set -o pipefail
          {
            set -euxo pipefail
            python -m pip install --upgrade pip
            python -m pip install -e '.[dev]'

            python -m compileall -q src/hoodie src/environment

            hoodie-experiments --help
            for command in \
              aggregate verify render export-bundle finalize \
              echo-train echo-eval echo-diff echo-pilot echo-status echo-verify-run
            do
              hoodie-experiments "$command" --help
            done

            python -m pytest -q \
              tests/unit/test_echo_campaign_layout.py \
              tests/unit/test_echo_cli_parser.py \
              tests/unit/test_resume_missing_job_dir.py \
              tests/unit/test_evaluation_reset_runtime_fix.py \
              tests/unit/test_external_pipeline_layout.py

            rm -rf /tmp/echo-verified-smoke
            bash scripts/echo/run_verified_smoke.sh /tmp/echo-verified-smoke

            python -m pytest -q \
              tests/unit tests/integration tests/acceptance \
              -m "not slow and not requires_cuda and not requires_mps"
          } 2>&1 | tee "$VALIDATION_LOG"
          rc=${PIPESTATUS[0]}
          printf 'exit_code=%s\n' "$rc" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Publish validation evidence
        if: always()
        uses: actions/github-script@v7
        env:
          EXIT_CODE: ${{ steps.validation.outputs.exit_code }}
          LOG_PATH: ${{ env.VALIDATION_LOG }}
        with:
          script: |
            const fs = require('fs');
            const title = '[CI] ECHO non-long validation status';
            const exitCode = process.env.EXIT_CODE || 'missing';
            let log = '(validation log unavailable)';
            if (fs.existsSync(process.env.LOG_PATH)) {
              log = fs.readFileSync(process.env.LOG_PATH, 'utf8');
            }
            const limit = 50000;
            if (log.length > limit) log = log.slice(log.length - limit);
            const conclusion = exitCode === '0' ? 'PASSED' : 'FAILED';
            const body = [
              `# ${conclusion}`,
              '',
              `- SHA: \`${context.sha}\``,
              `- Event: \`${context.eventName}\``,
              `- Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `- Exit code: \`${exitCode}\``,
              '- Scope: compile, installed CLI help, focused regressions, deterministic smoke, all non-long CPU tests',
              '- Long experiment started: `no`',
              '',
              '<details><summary>Validation log (tail)</summary>',
              '',
              '```text',
              log,
              '```',
              '</details>',
            ].join('\n');
            const {data: issues} = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });
            const existing = issues.find(issue => !issue.pull_request && issue.title === title);
            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                title,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
              });
            }

      - name: Enforce validation result
        if: always()
        shell: bash
        run: test "${{ steps.validation.outputs.exit_code }}" = "0"
