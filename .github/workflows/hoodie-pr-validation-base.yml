name: HOODIE PR validation gate

on:
  pull_request:
    branches:
      - hoodie-redesign/full-implementation-active
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: hoodie-pr-validation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout candidate merge
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Compile supported modules
        run: python -m compileall -q src hoodie

      - name: Run scientific preflight
        run: python -m hoodie.experiments preflight | tee preflight.json

      - name: Build and validate scientific matrix
        run: |
          python -m hoodie.experiments plan \
            --matrix /tmp/expected_production_job_matrix_v2.json \
            --shard-plan /tmp/shard_plan_v2.json \
            --campaign-root /tmp/hoodie-campaigns | tee plan.json
          python -m hoodie.experiments validate-contracts \
            --campaign-id figures-8-11-ci \
            --matrix /tmp/expected_production_job_matrix_v2.json | tee contract-validation.json

      - name: Run supported tests
        run: python -m pytest tests_supported/hoodie -q | tee pytest-supported.txt

      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hoodie-pr-validation
          path: |
            preflight.json
            plan.json
            contract-validation.json
            pytest-supported.txt
          if-no-files-found: warn
          retention-days: 7
