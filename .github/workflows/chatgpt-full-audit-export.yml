name: ChatGPT full repository audit export

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout audit branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate repository inventory
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/audit/full_repository_audit.py

      - name: Create source archive
        shell: bash
        run: |
          set -euo pipefail
          tar --exclude=.git --exclude='*.pt' --exclude='*.pth' --exclude='*.ckpt' -czf hoodie_sim_v2-audit-source.tar.gz .

      - name: Upload audit source
        uses: actions/upload-artifact@v4
        with:
          name: hoodie_sim_v2-full-audit-source
          path: |
            hoodie_sim_v2-audit-source.tar.gz
            artifacts/repository_audit/
          if-no-files-found: error
          retention-days: 1
