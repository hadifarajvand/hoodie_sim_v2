name: Repository-wide audit

on:
  pull_request_target:
    branches:
      - hoodie-redesign/full-implementation-active
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  audit:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout audited target branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: hoodie-redesign/full-implementation-active

      - name: Generate complete repository inventory and cleanup plan
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/audit/full_repository_audit.py

      - name: Commit audit outputs
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add artifacts/repository_audit/
          if git diff --cached --quiet; then
            echo "Audit outputs unchanged"
            exit 0
          fi
          git commit -m "audit: inventory and classify complete repository"
          git push origin HEAD:hoodie-redesign/full-implementation-active
