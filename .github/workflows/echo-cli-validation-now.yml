name: ECHO non-long validation gate

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: echo-non-long-validation-gate
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      MPLBACKEND: Agg
      VALIDATION_LOG: ${{ runner.temp }}/echo-validation-gate.log
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Publish validation start
        uses: actions/github-script@v7
        with:
          script: |
            const title = '[CI] ECHO non-long validation gate';
            const body = [
              '# RUNNING',
              '',
              `- SHA: \`${context.sha}\``,
              `- Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '- Scope: package install, compile, installed CLI help, focused regressions, deterministic smoke, all non-long CPU tests',
              '- Long experiment started: `no`',
            ].join('\n');
            const {data: issues} = await github.rest.issues.listForRepo({owner: context.repo.owner, repo: context.repo.repo, state: 'open', per_page: 100});
            const existing = issues.find(issue => !issue.pull_request && issue.title === title);
            if (existing) {
              await github.rest.issues.update({owner: context.repo.owner, repo: context.repo.repo, issue_number: existing.number, title, body});
            } else {
              await github.rest.issues.create({owner: context.repo.owner, repo: context.repo.repo, title, body});
            }

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package and development dependencies
        shell: bash
        run: |
          set -o pipefail
          {
            python -m pip install --upgrade pip
            python -m pip install -e '.[dev]'
          } 2>&1 | tee -a "$VALIDATION_LOG"

      - name: Compile application modules
        shell: bash
        run: |
          set -o pipefail
          python -m compileall -q src/hoodie src/environment 2>&1 | tee -a "$VALIDATION_LOG"

      - name: Verify installed CLI surface
        shell: bash
        run: |
          set -o pipefail
          {
            hoodie-experiments --help
            for command in \
              aggregate verify render export-bundle finalize verify-bundle \
              echo-train echo-eval echo-diff echo-pilot echo-status echo-verify-run
            do
              hoodie-experiments "$command" --help
            done
          } 2>&1 | tee -a "$VALIDATION_LOG"

      - name: Run focused ECHO regressions
        shell: bash
        run: |
          set -o pipefail
          python -m pytest -q \
            tests/unit/test_echo_campaign_layout.py \
            tests/unit/test_echo_cli_parser.py \
            tests/unit/test_resume_missing_job_dir.py \
            tests/unit/test_evaluation_reset_runtime_fix.py \
            tests/unit/test_external_pipeline_layout.py \
            2>&1 | tee -a "$VALIDATION_LOG"

      - name: Run deterministic mechanism smoke
        shell: bash
        run: |
          set -o pipefail
          {
            rm -rf /tmp/echo-verified-smoke
            bash scripts/echo/run_verified_smoke.sh /tmp/echo-verified-smoke
          } 2>&1 | tee -a "$VALIDATION_LOG"

      - name: Run all non-long CPU tests
        shell: bash
        run: |
          set -o pipefail
          python -m pytest -q \
            tests/unit tests/integration tests/acceptance \
            -m "not slow and not requires_cuda and not requires_mps" \
            2>&1 | tee -a "$VALIDATION_LOG"

      - name: Publish validation evidence
        if: always()
        uses: actions/github-script@v7
        env:
          JOB_STATUS: ${{ job.status }}
          LOG_PATH: ${{ env.VALIDATION_LOG }}
        with:
          script: |
            const fs = require('fs');
            const title = '[CI] ECHO non-long validation gate';
            const status = process.env.JOB_STATUS || 'unknown';
            let log = '(validation log unavailable)';
            if (fs.existsSync(process.env.LOG_PATH)) log = fs.readFileSync(process.env.LOG_PATH, 'utf8');
            const limit = 60000;
            if (log.length > limit) log = log.slice(log.length - limit);
            const conclusion = status === 'success' ? 'PASSED' : 'FAILED';
            const body = [
              `# ${conclusion}`,
              '',
              `- SHA: \`${context.sha}\``,
              `- Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `- Job status: \`${status}\``,
              '- Scope: package install, compile, installed CLI help, focused regressions, deterministic smoke, all non-long CPU tests',
              '- Long experiment started: `no`',
              '',
              '<details><summary>Validation log (tail)</summary>',
              '',
              '```text',
              log,
              '```',
              '</details>',
            ].join('\n');
            const {data: issues} = await github.rest.issues.listForRepo({owner: context.repo.owner, repo: context.repo.repo, state: 'open', per_page: 100});
            const existing = issues.find(issue => !issue.pull_request && issue.title === title);
            if (existing) {
              await github.rest.issues.update({owner: context.repo.owner, repo: context.repo.repo, issue_number: existing.number, title, body});
            } else {
              await github.rest.issues.create({owner: context.repo.owner, repo: context.repo.repo, title, body});
            }
